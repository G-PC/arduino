<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .arduino-board { fill: #1a6d8f; stroke: #0d4b63; stroke-width: 2; }
      .pin { fill: #c0c0c0; stroke: #888; stroke-width: 1; }
      .pin-label { fill: white; font-family: monospace; font-size: 11px; text-anchor: middle; }
      .wire { stroke: #ff8c00; stroke-width: 3; fill: none; }
      .wire-blue { stroke: #3399ff; stroke-width: 3; fill: none; }
      .wire-red { stroke: #ff3333; stroke-width: 3; fill: none; }
      .wire-black { stroke: #333333; stroke-width: 3; fill: none; }
      .resistor { fill: none; stroke: #8b4513; stroke-width: 3; }
      .led { fill: #ff4444; stroke: #cc0000; stroke-width: 2; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label-small { font-family: monospace; font-size: 12px; }
    </style>
  </defs>

  <!-- Фон -->
  <rect width="800" height="600" fill="#f5f5f5" rx="10"/>

  <!-- Заголовок -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a6d8f">Схема подключения светодиода к Arduino Uno</text>

  <!-- Arduino Uno плата -->
  <rect x="200" y="60" width="400" height="220" rx="8" class="arduino-board"/>

  <!-- Название на плате -->
  <text x="400" y="90" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">ARDUINO UNO</text>

  <!-- Разъём питания (слева) -->
  <text x="220" y="120" class="label-small" fill="white">POWER</text>
  <rect x="210" y="125" width="20" height="8" class="pin"/>
  <text x="220" y="138" class="pin-label" font-size="8">5V</text>
  <rect x="235" y="125" width="20" height="8" class="pin"/>
  <text x="245" y="138" class="pin-label" font-size="8">GND</text>

  <!-- Цифровые пины (справа) -->
  <text x="580" y="120" class="label-small" fill="white">DIGITAL</text>
  <rect x="550" y="125" width="16" height="8" class="pin"/>
  <text x="558" y="138" class="pin-label" font-size="7">D13</text>
  <rect x="570" y="125" width="16" height="8" class="pin"/>
  <text x="578" y="138" class="pin-label" font-size="7">D12</text>
  <rect x="590" y="125" width="16" height="8" class="pin"/>
  <text x="598" y="138" class="pin-label" font-size="7">D11</text>

  <!-- Пин D9 (к которому подключаем LED) -->
  <rect x="550" y="160" width="16" height="8" class="pin" fill="#ffcc00"/>
  <text x="558" y="175" class="pin-label" font-size="8" fill="black">D9</text>

  <!-- Пины D8, D7 -->
  <rect x="570" y="160" width="16" height="8" class="pin"/>
  <rect x="590" y="160" width="16" height="8" class="pin"/>

  <!-- Аналоговые пины -->
  <text x="220" y="200" class="label-small" fill="white">ANALOG IN</text>
  <rect x="210" y="210" width="16" height="8" class="pin"/>
  <rect x="230" y="210" width="16" height="8" class="pin"/>
  <rect x="250" y="210" width="16" height="8" class="pin"/>
  <rect x="270" y="210" width="16" height="8" class="pin"/>

  <!-- Земля GND -->
  <rect x="550" y="240" width="16" height="8" class="pin"/>
  <text x="558" y="255" class="pin-label" font-size="7">GND</text>

  <!-- ========== ВНЕШНИЕ КОМПОНЕНТЫ ========== -->

  <!-- Резистор 220 Ом -->
  <rect x="420" y="320" width="80" height="35" rx="5" fill="#d4a574" stroke="#8b4513" stroke-width="2"/>
  <text x="460" y="342" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#5a2d0c">220 Ω</text>

  <!-- Линии резистора -->
  <line x1="400" y1="337" x2="420" y2="337" stroke="#8b4513" stroke-width="3"/>
  <line x1="500" y1="337" x2="530" y2="337" stroke="#8b4513" stroke-width="3"/>

  <!-- Светодиод -->
  <!-- Катод (короткий, плоский) -->
  <rect x="530" y="380" width="8" height="20" fill="#333" stroke="#222" stroke-width="1"/>
  <!-- Анод (длинный) -->
  <rect x="522" y="380" width="8" height="20" fill="#666" stroke="#555" stroke-width="1"/>

  <!-- Корпус светодиода (круг) -->
  <circle cx="533" cy="410" r="18" class="led"/>
  <circle cx="533" cy="410" r="14" fill="#ff6666" stroke="#ff4444" stroke-width="1"/>
  <!-- Блик -->
  <circle cx="527" cy="404" r="4" fill="white" opacity="0.6"/>

  <!-- Обозначение + и - -->
  <text x="520" y="370" text-anchor="end" font-family="Arial" font-size="12" fill="#cc0000" font-weight="bold">+ (анод)</text>
  <text x="540" y="370" text-anchor="start" font-family="Arial" font-size="12" fill="#333" font-weight="bold">- (катод)</text>

  <!-- Стрелка тока -->
  <text x="555" y="430" font-family="Arial" font-size="20" fill="#ff8c00">↓</text>
  <text x="558" y="445" font-family="Arial" font-size="10" fill="#ff8c00">ток</text>

  <!-- Земля GND (символ) -->
  <text x="558" y="490" font-family="Arial" font-size="14" fill="#333" font-weight="bold">GND</text>
  <line x1="533" y1="430" x2="533" y2="460" class="wire-black"/>
  <line x1="520" y1="460" x2="546" y2="460" class="wire-black"/>
  <line x1="523" y1="466" x2="543" y2="466" class="wire-black"/>
  <line x1="526" y1="472" x2="540" y2="472" class="wire-black"/>

  <!-- Провода -->
  <!-- От D9 к резистору -->
  <path d="M 558 168 L 558 280 L 400 280 L 400 337" class="wire"/>

  <!-- От резистора к аноду (+) светодиода -->
  <path d="M 500 337 L 500 370 L 522 370" class="wire"/>

  <!-- От катода (-) к GND -->
  <path d="M 538 400 L 580 400 L 580 244 L 566 244" class="wire-black"/>

  <!-- Схема на макетной плате (опционально) -->
  <rect x="80" y="500" width="640" height="80" rx="5" fill="#e0e0e0" stroke="#aaa" stroke-width="2"/>
  <text x="400" y="525" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Макетная плата (Breadboard)</text>

  <!-- Ряды на макетной плате -->
  <g stroke="#ccc" stroke-width="1">
    <line x1="120" y1="540" x2="680" y2="540"/>
    <line x1="120" y1="550" x2="680" y2="550"/>
    <line x1="120" y1="560" x2="680" y2="560"/>
    <line x1="120" y1="570" x2="680" y2="570"/>
  </g>

  <!-- Условное обозначение резистора на макетке -->
  <rect x="350" y="540" width="60" height="25" rx="3" fill="#d4a574" stroke="#8b4513" stroke-width="1"/>

  <!-- Подписи -->
  <text x="400" y="590" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">
    Резистор 220 Ом обязателен! Без него светодиод сгорит.
  </text>

  <!-- Легенда -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="160" height="130" rx="5" fill="white" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="10" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Легенда:</text>
    <line x1="10" y1="35" x2="35" y2="35" class="wire"/>
    <text x="40" y="39" font-family="Arial" font-size="10" fill="#555">Сигнальный провод</text>
    <line x1="10" y1="55" x2="35" y2="55" class="wire-black"/>
    <text x="40" y="59" font-family="Arial" font-size="10" fill="#555">GND (земля)</text>
    <rect x="10" y="70" width="25" height="12" rx="2" fill="#ffcc00" stroke="#cc9900" stroke-width="1"/>
    <text x="40" y="82" font-family="Arial" font-size="10" fill="#555">Пин D9 (PWM)</text>
    <circle cx="22" cy="100" r="8" class="led"/>
    <text x="40" y="104" font-family="Arial" font-size="10" fill="#555">Светодиод (LED)</text>
  </g>
</svg>
