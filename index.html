<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino Памятка | Главная</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
      background: #f0f4f8;
      color: #0a2b3e;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #006d77, #2c7da0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header p {
      color: #2c3e50;
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    .card {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      text-decoration: none;
      color: #0a2b3e;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: 0.2s;
      display: block;
      border: 1px solid #dce7f0;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 28px -12px rgba(0,109,119,0.2);
      border-color: #83c5be;
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .card h2 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: #006d77;
    }

    .card p {
      color: #2c3e50;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      background: #e0f0ea;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Памятка Arduino</h1>
    <p>Схемы подключения + готовый код для каждого компонента</p>
    <p style="font-size:0.9rem; margin-top:0.8rem;">⚡ Нажмите на элемент, чтобы увидеть схему и код</p>
  </div>

  <div class="grid">
    <!-- Светодиод -->
    <a href="elements/led.html" class="card">
      <div class="card-icon">💡</div>
      <h2>Светодиод (LED)</h2>
      <p>Управление яркостью, мигание, ШИМ. Подключение.</p>
      <span class="badge">📸 Схема + код →</span>
    </a>
  </div>
</div>
</body>
</html>
